<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biostimulace – AI Asistent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1a2e4a;
    --teal: #007b8a;
    --teal-light: #00a3b4;
    --teal-pale: #e0f4f6;
    --white: #ffffff;
    --off-white: #f7f9fa;
    --light-gray: #eef1f4;
    --border: #d5dde5;
    --text: #222831;
    --text-muted: #6b7a8d;
  }
  body {
    font-family: 'Lato', sans-serif;
    background: var(--light-gray);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 15% 15%, rgba(0,123,138,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 85%, rgba(26,46,74,0.06) 0%, transparent 50%);
  }
  .chat-wrapper {
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(26,46,74,0.13);
  }
  .chat-header {
    background: var(--navy);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .chat-header::after {
    content: '';
    position: absolute;
    right: -30px; top: -30px;
    width: 110px; height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,163,180,0.25) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-logo {
    width: 44px; height: 44px;
    background: var(--teal);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    font-family: 'Open Sans', sans-serif;
  }
  .header-info h2 {
    font-family: 'Open Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }
  .header-info p {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-top: 3px;
    font-weight: 300;
  }
  .online-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: #4dd9a0;
    border-radius: 50%;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .chat-messages {
    background: var(--off-white);
    min-height: 370px;
    max-height: 460px;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .message {
    display: flex;
    gap: 9px;
    animation: fadeUp 0.28s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .message.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 30px; height: 30px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Open Sans', sans-serif;
    flex-shrink: 0;
    align-self: flex-end;
    color: #fff;
  }
  .message.ai .msg-avatar { background: var(--teal); }
  .message.user .msg-avatar { background: var(--navy); }
  .msg-bubble {
    max-width: 80%;
    padding: 11px 15px;
    font-size: 13.5px;
    line-height: 1.62;
    color: var(--text);
  }
  .message.ai .msg-bubble {
    background: var(--white);
    border-radius: 3px 14px 14px 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    border-left: 3px solid var(--teal);
  }
  .message.user .msg-bubble {
    background: var(--navy);
    color: #fff;
    border-radius: 14px 3px 14px 14px;
  }
  .msg-bubble p { margin-bottom: 6px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble strong { font-weight: 600; }
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    padding-left: 39px;
    margin-top: 2px;
  }
  .quick-btn {
    background: var(--white);
    border: 1.5px solid var(--teal);
    color: var(--teal);
    padding: 5px 13px;
    border-radius: 20px;
    font-size: 12.5px;
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .quick-btn:hover { background: var(--teal); color: #fff; }
  .typing-indicator { display: flex; gap: 9px; align-items: flex-end; }
  .typing-dots {
    background: var(--white);
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    border-left: 3px solid var(--teal);
    padding: 11px 15px;
    border-radius: 3px 14px 14px 14px;
    display: flex; gap: 4px; align-items: center;
  }
  .typing-dots span {
    width: 6px; height: 6px;
    background: var(--teal-light);
    border-radius: 50%;
    animation: bounce 1.1s infinite;
  }
  .typing-dots span:nth-child(2){animation-delay:0.18s}
  .typing-dots span:nth-child(3){animation-delay:0.36s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
  .info-bar {
    background: var(--teal-pale);
    border-top: 1px solid rgba(0,123,138,0.18);
    padding: 9px 16px;
    font-size: 12px;
    color: var(--teal);
    display: flex; align-items: center; gap: 6px;
  }
  .info-bar strong { color: var(--navy); }
  .chat-input-area {
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 14px;
    display: flex; gap: 9px; align-items: flex-end;
  }
  .chat-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 13px;
    font-size: 13.5px;
    font-family: 'Lato', sans-serif;
    color: var(--text);
    background: var(--off-white);
    outline: none;
    resize: none;
    min-height: 40px;
    max-height: 110px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--teal); background: #fff; }
  .chat-input::placeholder { color: #b0bcc8; }
  .send-btn {
    width: 40px; height: 40px;
    background: var(--teal);
    border: none; border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s; color: #fff;
  }
  .send-btn:hover { background: var(--teal-light); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }
  .send-btn svg { width: 17px; height: 17px; }
  .disclaimer {
    background: #f0f3f6;
    border-top: 1px solid var(--border);
    padding: 8px 16px;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
    font-style: italic;
  }
  .chat-brand {
    background: var(--navy);
    text-align: center;
    padding: 8px;
    font-size: 11px;
    color: rgba(255,255,255,0.45);
  }
  .chat-brand span { color: var(--teal-light); }
</style>
</head>
<body>
<div class="chat-wrapper">
  <div class="chat-header">
    <div class="header-logo">BIO</div>
    <div class="header-info">
      <h2>MedicGroup – online poradce</h2>
      <p><span class="online-dot"></span>Biostimulace &amp; Biorezonance Praha · Hluboš</p>
    </div>
  </div>
  <div class="chat-messages" id="messages"></div>
  <div class="info-bar">
    📞 Objednávky: <strong>+420 603 239 255</strong>&nbsp;&nbsp;|&nbsp;&nbsp;info@biostimulace.cz
  </div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="userInput" placeholder="Napište svůj dotaz…" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="disclaimer">Informace mají orientační charakter a nenahrazují lékařskou péči. Pro objednání volejte +420 603 239 255.</div>
  <div class="chat-brand">Poháněno <span>Claude AI</span> · MedicGroup Ambulance s.r.o.</div>
</div>

<script>
const MAKE_WEBHOOK = 'https://hook.eu2.make.com/c4efuydcqdwu5q3sj7h8gs4elh5osd4t';

// Vyčistí text od JSON obálky a Markdown formátování
function cleanText(raw) {
  let text = raw || '';
  
  // Odstraní JSON obálku {"type":"text","text":"..."} 
  try {
    const parsed = JSON.parse(text);
    if (parsed.text) text = parsed.text;
    else if (parsed[0] && parsed[0].text) text = parsed[0].text;
  } catch(e) {}
  
  // Odstraní JSON fragment na konci: "}text"
  text = text.replace(/\}text\s*$/, '').replace(/^\s*\{[^}]*\}\s*/, '');
  
  // Odstraní Markdown hlavičky ## a #
  text = text.replace(/#{1,3}\s+/g, '');
  
  // Odstraní hvězdičky pro tučné **text** → text
  text = text.replace(/\*\*(.*?)\*\*/g, '$1');
  text = text.replace(/\*(.*?)\*/g, '$1');
  
  // Nahradí \n za skutečné nové řádky
  text = text.replace(/\\n/g, '\n');
  
  // Odstraní nadměrné pomlčky ---
  text = text.replace(/---+/g, '');
  
  // Odstraní emoji na začátku řádků jako 📍 🏥 atd — necháme jen text
  // (emoji v textu necháme, jen odstraníme přebytečné mezery)
  text = text.replace(/\n{3,}/g, '\n\n');
  text = text.trim();
  
  return text;
}

function formatMessage(text) {
  // Rozdělí na odstavce a vytvoří HTML
  const paragraphs = text.split('\n\n').filter(p => p.trim());
  if (paragraphs.length <= 1) {
    // Jeden odstavec — nahradí \n za <br>
    return text.replace(/\n/g, '<br>');
  }
  return paragraphs.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
}

function addMessage(role, text, quickReplies = []) {
  const messagesDiv = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = `message ${role}`;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'ai' ? 'BIO' : '👤';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  
  if (role === 'ai') {
    const cleaned = cleanText(text);
    bubble.innerHTML = formatMessage(cleaned);
  } else {
    bubble.textContent = text;
  }
  
  wrapper.appendChild(avatar);
  wrapper.appendChild(bubble);
  messagesDiv.appendChild(wrapper);
  if (quickReplies.length > 0) {
    const qr = document.createElement('div');
    qr.className = 'quick-replies';
    quickReplies.forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'quick-btn';
      btn.textContent = label;
      btn.onclick = () => { qr.remove(); sendUserMessage(label); };
      qr.appendChild(btn);
    });
    messagesDiv.appendChild(qr);
  }
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function showTyping() {
  const messagesDiv = document.getElementById('messages');
  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.id = 'typing';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.style.background = '#007b8a';
  avatar.textContent = 'BIO';
  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';
  indicator.appendChild(avatar);
  indicator.appendChild(dots);
  messagesDiv.appendChild(indicator);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function sendUserMessage(text) {
  addMessage('user', text);
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  showTyping();
  try {
    const response = await fetch(MAKE_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const reply = await response.text();
    removeTyping();
    addMessage('ai', reply || 'Omlouvám se, zkuste to prosím znovu.');
  } catch (err) {
    removeTyping();
    addMessage('ai', 'Omlouvám se, nastala technická chyba. Zavolejte nám na +420 603 239 255.');
  }
  sendBtn.disabled = false;
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  sendUserMessage(text);
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 110) + 'px';
});

window.addEventListener('load', () => {
  setTimeout(() => {
    addMessage('ai',
      'Dobrý den! Jsem online poradce MedicGroup Ambulance. Trápí vás chronické potíže, alergie, únava nebo bolesti? Rádo vám poradím, která z našich terapií by mohla pomoci.',
      ['Biorezonance – co to je?', 'BBC diagnostika', 'Mám chronickou únavu', 'Objednání a ceny']
    );
  }, 350);
});
</script>
</body>
</html>
